<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评论区 - 同创汽车城</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: transparent;
      padding: 24px 28px;
      /* 关键：让body高度由内容撑开，不限制 */
      min-height: 100%;
      display: block;
    }
    .comment-header {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .comment-hint {
      font-size: 12px;
      font-weight: 400;
      color: #999;
    }
    #cusdis_thread {
      min-height: 500px;
    }
    .cusdis-thread {
      font-family: inherit !important;
    }
    .cusdis-thread input,
    .cusdis-thread textarea {
      border-radius: 8px !important;
      border: 1px solid #ddd !important;
      font-size: 14px !important;
    }
    .cusdis-thread textarea {
      min-height: 100px !important;
    }
    .cusdis-thread button {
      border-radius: 8px !important;
      font-weight: 600 !important;
    }
    .cusdis-comment-list,
    .cusdis-inner {
      max-height: none !important;
    }
  </style>
</head>
<body>
  <div class="comment-header">
    💬 读者评论 <span class="comment-hint">（无需登录，填写昵称即可留言）</span>
  </div>
  <div id="cusdis_thread"
    data-host="https://cusdis.com"
    data-app-id="baa6efd7-a340-4fbb-a5fe-b66ffebacd3b"
    data-page-id=""
    data-page-url=""
    data-page-title=""
  ></div>
  <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var pageId = params.get('page_id') || 'default';
      var pageTitle = params.get('title') || '同创汽车城';

      var el = document.getElementById('cusdis_thread');
      el.setAttribute('data-page-id', pageId);
      el.setAttribute('data-page-url', 'https://tongchuangqichecheng.github.io/market.html#' + pageId);
      el.setAttribute('data-page-title', decodeURIComponent(pageTitle));

      // 定时通知父页面更新iframe高度
      function sendHeight() {
        var h = document.body.scrollHeight || document.documentElement.scrollHeight;
        if (window.parent && window.parent.postMessage) {
          window.parent.postMessage({ type: 'resize', height: h }, '*');
        }
      }

      // 多次发送确保覆盖到完整高度
      setTimeout(sendHeight, 500);
      setTimeout(sendHeight, 1500);
      setTimeout(sendHeight, 3000);

      // Cusdis加载完成后也发一次
      var _origLoad = null;
      // 监听Cusdis渲染完成
      var observer = new MutationObserver(function() {
        sendHeight();
      });
      if (document.body) {
        observer.observe(document.body, { childList: true, subtree: true, attributes: true });
      }
    })();
  </script>
</body>
</html>
