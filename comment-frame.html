<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评论区 - 同创汽车城</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      padding: 24px 28px;
      min-height: 100%;
      overflow: visible !important;
    }

    .comment-header {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .comment-hint {
      font-size: 12px;
      font-weight: 400;
      color: #999;
    }

    /* ===== 核心策略：用JS动态撑开，CSS只做辅助 ===== */
    #cusdis_thread {
      min-height: 800px !important;
      max-height: none !important;
    }

    .cusdis-thread {
      font-family: inherit !important;
      max-width: 100% !important;
      min-height: 800px !important;
      max-height: none !important;
      height: auto !important;
    }

    .cusdis-thread input,
    .cusdis-thread textarea {
      border-radius: 8px !important;
      border: 1px solid #ddd !important;
      font-size: 14px !important;
    }
    .cusdis-thread textarea {
      min-height: 100px !important;
    }
    .cusdis-thread button {
      border-radius: 8px !important;
      font-weight: 600 !important;
    }

    /* 尝试覆盖Cusdis内部可能的高度限制 */
    #cusdis_thread [style*="height"],
    #cusdis_thread [style*="max-height"],
    [class*="cusdis"] [style*="height"],
    [class*="cusdis"] [style*="max-height"] {
      max-height: none !important;
      height: auto !important;
      overflow: visible !important;
    }
  </style>
</head>
<body>
  <div class="comment-header">
    💬 读者评论 <span class="comment-hint">（无需登录，填写昵称即可留言）</span>
  </div>
  <div id="cusdis_thread"
    data-host="https://cusdis.com"
    data-app-id="baa6efd7-a340-4fbb-a5fe-b66ffebacd3b"
    data-page-id=""
    data-page-url=""
    data-page-title=""
  ></div>

  <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

  <script>
    (function() {
      // 1. 设置参数
      var params = new URLSearchParams(window.location.search);
      var pageId = params.get('page_id') || 'default';
      var pageTitle = params.get('title') || '同创汽车城';

      var el = document.getElementById('cusdis_thread');
      el.setAttribute('data-page-id', pageId);
      el.setAttribute('data-page-url', 'https://tongchuangqichecheng.github.io/market.html#' + pageId);
      el.setAttribute('data-page-title', decodeURIComponent(pageTitle));

      // 2. 核心功能：强制撑开所有内部元素，定时执行确保覆盖
      function forceExpandAll() {
        // 撑开#cusdis_thread本身
        var ct = document.getElementById('cusdis_thread');
        if (ct) {
          ct.style.setProperty('min-height', '800px', 'important');
          ct.style.setProperty('max-height', 'none', 'important');
          ct.style.setProperty('height', 'auto', 'important');
          ct.style.setProperty('overflow', 'visible', 'important');
        }

        // 撑开.cusdis-thread及其所有子元素
        var allEls = document.querySelectorAll('.cusdis-thread, .cusdis-thread *, #cusdis_thread > *');
        for (var i = 0; i < allEls.length; i++) {
          var node = allEls[i];
          var computedStyle = window.getComputedStyle(node);
          // 如果这个元素有固定高度或最大高度限制
          var h = computedStyle.maxHeight;
          if (h && h !== 'none' && h !== '0px' && parseFloat(h) < 5000) {
            node.style.setProperty('max-height', 'none', 'important');
            node.style.setProperty('overflow', 'visible', 'important');
          }
          var oh = computedStyle.overflow;
          if (oh === 'auto' || oh === 'scroll' || oh === 'hidden') {
            node.style.setProperty('overflow', 'visible', 'important');
          }
        }

        // 特别处理可能的iframe或ShadowRoot容器
        var iframes = document.querySelectorAll('#cusdis_thread iframe, .cusdis-thread iframe');
        for (var j = 0; j < iframes.length; j++) {
          iframes[j].style.setProperty('min-height', '2000px', 'important');
          iframes[j].style.setProperty('max-height', 'none', 'important');
        }
      }

      // 3. 通知父页面更新高度
      function sendHeight() {
        var h = Math.max(
          document.body.scrollHeight,
          document.documentElement.scrollHeight,
          document.body.offsetHeight,
          2000
        );
        if (window.parent && window.parent.postMessage) {
          window.parent.postMessage({ type: 'resize', height: h }, '*');
        }
      }

      // 4. 定时执行（多次触发以确保Cusdis加载完后也能生效）
      var intervals = [300, 600, 1000, 1500, 2000, 3000, 4000, 5000, 7000, 10000];
      intervals.forEach(function(delay) {
        setTimeout(function() {
          forceExpandAll();
          sendHeight();
        }, delay);
      });

      // 5. 监听DOM变化
      if (typeof MutationObserver !== 'undefined') {
        var observer = new MutationObserver(function() {
          forceExpandAll();
          sendHeight();
        });
        if (document.body) observer.observe(document.body, { childList: true, subtree: true, attributes: true });
      }
    })();
  </script>
</body>
</html>
