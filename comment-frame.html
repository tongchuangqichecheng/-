<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评论区 - 同创汽车城</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      padding: 24px 28px;
      min-height: 100%;
      height: auto;
      overflow: visible;
    }

    .comment-header {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .comment-hint {
      font-size: 12px;
      font-weight: 400;
      color: #999;
    }

    /* ===== 核心：彻底放开Cusdis所有高度限制 ===== */
    #cusdis_thread {
      min-height: 600px !important;
      max-height: none !important;
      height: auto !important;
    }

    /* Cusdis 根容器 */
    .cusdis-thread {
      font-family: inherit !important;
      max-width: 100% !important;
      min-height: 600px !important;
      max-height: none !important;
      height: auto !important;
      overflow: visible !important;
    }

    /* Cusdis 内部可能有的包装层 - 全部放开 */
    #cusdis_thread > *,
    #cusdis_thread > * > *,
    .cusdis-thread > *,
    .cusdis-inner,
    [class*="cusdis"] {
      max-height: none !important;
      overflow: visible !important;
    }

    /* 评论列表区 - 关键！这是之前"小框子"的根源 */
    .cusdis-comment-list,
    .cusdis-comment-list > div,
    [class*="comment-list"],
    [class*="commentList"] {
      max-height: none !important;
      height: auto !important;
      overflow: visible !important;
    }

    /* 输入框样式 */
    .cusdis-thread input,
    .cusdis-thread textarea {
      border-radius: 8px !important;
      border: 1px solid #ddd !important;
      font-size: 14px !important;
    }
    .cusdis-thread textarea {
      min-height: 100px !important;
      max-height: none !important;
    }
    .cusdis-thread button {
      border-radius: 8px !important;
      font-weight: 600 !important;
    }

    /* 如果Cusdis内部用了iframe，也要放开 */
    #cusdis_thread iframe,
    iframe[src*="cusdis"] {
      min-height: 800px !important;
      max-height: none !important;
    }
  </style>
</head>
<body>
  <div class="comment-header">
    💬 读者评论 <span class="comment-hint">（无需登录，填写昵称即可留言）</span>
  </div>
  <div id="cusdis_thread"
    data-host="https://cusdis.com"
    data-app-id="baa6efd7-a340-4fbb-a5fe-b66ffebacd3b"
    data-page-id=""
    data-page-url=""
    data-page-title=""
  ></div>

  <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var pageId = params.get('page_id') || 'default';
      var pageTitle = params.get('title') || '同创汽车城';

      var el = document.getElementById('cusdis_thread');
      el.setAttribute('data-page-id', pageId);
      el.setAttribute('data-page-url', 'https://tongchuangqichecheng.github.io/market.html#' + pageId);
      el.setAttribute('data-page-title', decodeURIComponent(pageTitle));

      // 通知父页面更新iframe高度
      function sendHeight() {
        var h = Math.max(
          document.body.scrollHeight,
          document.documentElement.scrollHeight,
          document.body.offsetHeight,
          2000  // 最小保证高度
        );
        if (window.parent && window.parent.postMessage) {
          window.parent.postMessage({ type: 'resize', height: h }, '*');
        }
      }

      // 多时机发送
      setTimeout(sendHeight, 500);
      setTimeout(sendHeight, 1000);
      setTimeout(sendHeight, 2000);
      setTimeout(sendHeight, 3500);
      setTimeout(sendHeight, 5000);

      // 监听DOM变化（Cusdis动态插入内容）
      var observer = new MutationObserver(function() {
        sendHeight();
      });
      if (document.body) {
        observer.observe(document.body, { childList: true, subtree: true, attributes: true });
      }
    })();
  </script>
</body>
</html>
